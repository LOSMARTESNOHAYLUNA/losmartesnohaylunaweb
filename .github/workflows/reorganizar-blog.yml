name: Reorganizar artículos del blog

# Se ejecuta SOLO cuando tú le das al botón "Run workflow" en GitHub
on:
  workflow_dispatch:

jobs:
  reorganizar:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necesario para hacer commit y push

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Crear carpeta /blog/ y mover archivos
        run: |
          mkdir -p blog

          # Buscar todos los blog-*.html en la raíz
          for FILE in blog-*.html; do
            [ -f "$FILE" ] || continue
            NEW_NAME="${FILE#blog-}"
            cp "$FILE" "blog/${NEW_NAME}"
            echo "Copiado: $FILE → blog/${NEW_NAME}"
          done

      - name: Actualizar enlaces internos en todos los HTML
        run: |
          for FILE in blog-*.html; do
            [ -f "$FILE" ] || continue
            NEW_NAME="${FILE#blog-}"

            OLD_ABS="/${FILE}"
            NEW_ABS="/blog/${NEW_NAME}"
            OLD_REL="${FILE}"
            NEW_REL="blog/${NEW_NAME}"

            find . -name "*.html" -not -path "./.git/*" | while read HTML; do
              sed -i \
                -e "s|href=\"${OLD_ABS}\"|href=\"${NEW_ABS}\"|g" \
                -e "s|href='${OLD_ABS}'|href='${NEW_ABS}'|g" \
                -e "s|href=\"${OLD_REL}\"|href=\"${NEW_REL}\"|g" \
                -e "s|href='${OLD_REL}'|href='${NEW_REL}'|g" \
                "$HTML"
            done
          done
          echo "Enlaces actualizados"

      - name: Añadir 301 redirects en vercel.json
        run: |
          python3 << 'PYEOF'
          import json, os, glob

          with open('vercel.json', 'r', encoding='utf-8') as f:
              config = json.load(f)

          if 'redirects' not in config:
              config['redirects'] = []

          for filepath in glob.glob('blog-*.html'):
              filename = os.path.basename(filepath)
              new_name = filename[len('blog-'):]   # quitar prefijo blog-
              source      = f"/{filename}"
              destination = f"/blog/{new_name}"

              already = any(r.get('source') == source for r in config['redirects'])
              if not already:
                  config['redirects'].append({
                      "source":      source,
                      "destination": destination,
                      "permanent":   True
                  })
                  print(f"  ↪  {source}  →  {destination}")

          with open('vercel.json', 'w', encoding='utf-8') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)

          print("vercel.json actualizado")
          PYEOF

      - name: Eliminar archivos originales de la raíz
        run: |
          for FILE in blog-*.html; do
            [ -f "$FILE" ] || continue
            rm "$FILE"
            echo "Eliminado de raíz: $FILE"
          done

      - name: Commit y push de todos los cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: mover artículos del blog a /blog/ con redirects 301"
          git push
          echo "✅ Cambios subidos al repositorio"
